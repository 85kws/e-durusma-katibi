name: build-exe

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Kütüphaneleri kur
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install huggingface_hub

      - name: Whisper modelini indir (exe'ye gömmek icin - offline)
        run: python -c "from huggingface_hub import snapshot_download; snapshot_download('Systran/faster-whisper-medium', local_dir='model')"

      - name: Ana uygulama EXE (model gomulu, onedir)
        run: >
          pyinstaller --noconfirm --onedir --noconsole --name "E-DurusmaKatibi"
          --add-data "model;model"
          --collect-all faster_whisper
          --collect-all ctranslate2
          --collect-all onnxruntime
          --collect-all av
          --collect-all tokenizers
          e_durusma_katibi.py

      - name: Mevzuat penceresi EXE (UYAP_Mevzuat, tek dosya)
        run: >
          pyinstaller --noconfirm --onefile --noconsole --name "UYAP_Mevzuat"
          adim2_mevzuat_simulator.py

      - name: NOTLAR'i ve mevzuat exe'sini paketle
        run: |
          copy NOTLAR_WINDOWS.md dist\
          copy dist\UYAP_Mevzuat.exe dist\E-DurusmaKatibi\

      - name: Paketi yukle (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: E-DurusmaKatibi-Windows
          path: |
            dist/E-DurusmaKatibi
            dist/UYAP_Mevzuat.exe
            dist/NOTLAR_WINDOWS.md
          retention-days: 30
